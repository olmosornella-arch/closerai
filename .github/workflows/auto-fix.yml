name: Auto Fix and Create PR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run ESLint fix
        run: |
          npx eslint "src/**/*.{js,jsx,ts,tsx}" --fix || true

      - name: Show git status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: apply eslint --fix and tsc fixes (automated)"
          git push --set-upstream origin "auto-fix/${{ github.run_id }}" || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore: apply eslint --fix and tsc fixes (automated)
          branch: auto-fix/${{ github.run_id }}
          title: "Automated fixes: eslint --fix / tsc"
          body: |
            Este PR fue generado automáticamente por el workflow `Auto Fix and Create PR`.
            Ejecuta: npx tsc --noEmit y npx eslint --fix.
            Revisá los cambios antes de mergear.
          labels: automated, ci
